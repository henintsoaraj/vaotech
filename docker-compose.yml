services:

  backend:
    build: ./backend
    stdin_open: true
    tty: true
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    command: python -m uvicorn app.main:app --host 0.0.0.0 --reload
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vaotech
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user_password
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis
    ports:
      - "6379:6379"

  worker:
    build: ./backend
    command: python -m celery -A app.workers.celery_app.celery_app worker --loglevel=info
    depends_on:
      - redis
      - postgres

  beat:
    build: ./backend
    command: python -m celery -A app.workers.celery_app.celery_app beat --loglevel=info
    depends_on:
    - redis
    - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data: